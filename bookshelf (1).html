<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Bookshelf</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --off-white:   #f9f8f6;
      --off-white-2: #f2f0ed;
      --border:      #e8e4de;
      --border-dark: #d4cfc8;
      --ink:         #1a1816;
      --ink-mid:     #5c5650;
      --ink-soft:    #9e9890;
      --accent:      #2a5c45;
      --accent-2:    #3d7a5e;
      --accent-bg:   #edf5f1;
      --white:       #ffffff;
      --shadow-xs:   0 1px 4px rgba(26,24,22,.06);
      --shadow-sm:   0 2px 12px rgba(26,24,22,.08);
      --shadow-md:   0 6px 28px rgba(26,24,22,.11);
      --shadow-lg:   0 18px 60px rgba(26,24,22,.15);
      --r:           10px;
    }

    .gc-Fiction           { --gc:#2a5080; --gb:#ebf1fa; }
    .gc-Non-Fiction       { --gc:#7a4820; --gb:#f6ede3; }
    .gc-Historical-Fiction{ --gc:#6a5018; --gb:#f5eedc; }
    .gc-Mystery           { --gc:#50306a; --gb:#ece5f4; }
    .gc-Thriller          { --gc:#8c2828; --gb:#f6e8e8; }
    .gc-Science-Fiction   { --gc:#1c6878; --gb:#e0f1f5; }
    .gc-Fantasy           { --gc:#2a6844; --gb:#e2f0e9; }
    .gc-Romance           { --gc:#8c3468; --gb:#f4e3ee; }
    .gc-Biography         { --gc:#406028; --gb:#e8f0e0; }
    .gc-Self-Help         { --gc:#a05c14; --gb:#f6ead8; }
    .gc-Psychology        { --gc:#4c5868; --gb:#eaeef4; }
    .gc-Philosophy        { --gc:#605050; --gb:#f0eaea; }
    .gc-Poetry            { --gc:#7a4090; --gb:#f2e6f6; }
    .gc-Other             { --gc:#787878; --gb:#efefef; }

    .genre-tag {
      display:inline-block; font-size:10px; font-weight:600;
      text-transform:uppercase; letter-spacing:.1em;
      padding:3px 9px; border-radius:4px;
      background:var(--gb,#efefef); color:var(--gc,#787878);
    }

    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

    body {
      font-family:'Plus Jakarta Sans', sans-serif;
      background:var(--off-white); color:var(--ink); min-height:100vh;
    }

    /* ── TOP NAV ─────────────────────────────────────────── */
    .top-nav {
      background:var(--white);
      border-bottom:1px solid var(--border);
      position:sticky; top:0; z-index:100;
      box-shadow:var(--shadow-xs);
    }

    .nav-main {
      display:flex; align-items:center; justify-content:space-between;
      padding:0 52px; height:58px;
    }

    .logo { display:flex; align-items:center; gap:10px; }
    .logo-mark {
      width:30px; height:30px; background:var(--ink);
      border-radius:7px; display:flex; align-items:center; justify-content:center;
    }
    .logo-mark svg { width:15px; height:15px; stroke:white; }
    .logo-name { font-size:15px; font-weight:700; color:var(--ink); letter-spacing:-.03em; }
    .logo-dot  { color:var(--accent); }

    .nav-center { display:flex; align-items:center; gap:5px; }
    .stat-pill {
      display:flex; align-items:center; gap:7px; padding:5px 14px;
      border-radius:20px; border:1px solid var(--border); background:var(--off-white);
    }
    .stat-pill-num   { font-size:13px; font-weight:700; color:var(--ink); letter-spacing:-.02em; }
    .stat-pill-label { font-size:11px; color:var(--ink-soft); }
    .spd             { width:1px; height:13px; background:var(--border-dark); }
    .stat-pill-sub   { font-size:11px; font-weight:500; color:var(--ink-mid); }

    .nav-right { display:flex; align-items:center; gap:10px; }

    .goal-chip {
      display:flex; align-items:center; gap:8px; padding:5px 12px;
      border:1px solid var(--border); border-radius:20px;
      background:var(--off-white); cursor:pointer; transition:all .2s;
    }
    .goal-chip:hover { border-color:var(--accent); background:var(--accent-bg); }
    .goal-chip-bar   { width:54px; height:4px; background:var(--border-dark); border-radius:10px; overflow:hidden; }
    .goal-chip-fill  { height:100%; background:var(--accent); border-radius:10px; transition:width .4s; }
    .goal-chip-text  { font-size:11px; font-weight:600; color:var(--ink-mid); white-space:nowrap; }

    .btn-add {
      display:flex; align-items:center; gap:7px;
      background:var(--ink); color:white; border:none;
      padding:8px 18px; border-radius:8px;
      font-family:'Plus Jakarta Sans',sans-serif; font-size:13px; font-weight:600;
      cursor:pointer; letter-spacing:-.01em; transition:background .2s, transform .15s;
    }
    .btn-add:hover { background:#333; transform:translateY(-1px); }
    .btn-add svg { width:13px; height:13px; stroke:white; }

    /* ── HERO BANNER ─────────────────────────────────────── */
    .hero {
      position:relative; height:220px; overflow:hidden;
    }

    .hero-img {
      width:100%; height:100%;
      object-fit:cover; object-position:center 40%;
      display:block;
      filter:brightness(.88) saturate(1.05);
    }

    /* gradient overlay for readability */
    .hero::after {
      content:'';
      position:absolute; inset:0;
      background: linear-gradient(
        to bottom,
        rgba(26,24,22,.0) 0%,
        rgba(26,24,22,.08) 50%,
        rgba(26,24,22,.45) 100%
      );
    }

    .hero-content {
      position:absolute; inset:0; z-index:1;
      display:flex; flex-direction:column;
      justify-content:flex-end; padding:28px 52px;
    }

    .hero-label {
      font-size:10px; font-weight:700; text-transform:uppercase;
      letter-spacing:.14em; color:rgba(255,255,255,.6); margin-bottom:8px;
    }
    .hero-title {
      font-size:28px; font-weight:700; color:white; letter-spacing:-.04em;
      line-height:1.1; margin-bottom:6px;
    }
    .hero-title span { opacity:.6; font-weight:400; }
    .hero-meta {
      display:flex; align-items:center; gap:16px; flex-wrap:wrap;
    }
    .hero-badge {
      display:flex; align-items:center; gap:6px;
      background:rgba(255,255,255,.12); backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,.2);
      border-radius:20px; padding:4px 12px;
      font-size:12px; font-weight:600; color:white; letter-spacing:-.01em;
    }
    .hero-badge-dot {
      width:6px; height:6px; border-radius:50%; background:white; opacity:.7;
    }
    .hero-badge-dot.green { background:#6ee0a0; opacity:1; }
    .hero-badge-dot.blue  { background:#6ab0f0; opacity:1; }

    .hero-goal-wrap {
      display:flex; align-items:center; gap:10px; cursor:pointer;
    }
    .hero-goal-bar-bg {
      width:100px; height:4px;
      background:rgba(255,255,255,.25); border-radius:10px; overflow:hidden;
    }
    .hero-goal-bar-fill {
      height:100%; background:#6ee0a0; border-radius:10px; transition:width .5s;
    }
    .hero-goal-text { font-size:12px; font-weight:600; color:rgba(255,255,255,.85); }
    .hero-goal-set  {
      font-size:11px; color:rgba(255,255,255,.5);
      background:none; border:none; cursor:pointer; font-family:inherit;
      text-decoration:underline; text-underline-offset:2px;
      transition:color .2s;
    }
    .hero-goal-set:hover { color:rgba(255,255,255,.9); }

    /* ── FILTER BAR ──────────────────────────────────────── */
    .filter-bar {
      background:white; border-bottom:1px solid var(--border);
      display:flex; align-items:center; padding:0 52px;
      gap:0; overflow-x:auto; scrollbar-width:none;
    }
    .filter-bar::-webkit-scrollbar { display:none; }

    .nav-tab {
      padding:10px 18px; font-size:12px; font-weight:600;
      color:var(--ink-soft); letter-spacing:.03em; text-transform:uppercase;
      border:none; background:none; cursor:pointer; white-space:nowrap;
      border-bottom:2px solid transparent; margin-bottom:-1px;
      transition:color .2s, border-color .2s;
    }
    .nav-tab:hover { color:var(--ink); }
    .nav-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
    .tab-sep { width:1px; height:16px; background:var(--border); align-self:center; margin:0 4px; }

    .bar-right {
      margin-left:auto; display:flex; align-items:center; gap:8px; padding:6px 0;
    }
    .sort-select {
      border:1px solid var(--border); border-radius:7px; padding:5px 10px;
      font-family:'Plus Jakarta Sans',sans-serif; font-size:11px; font-weight:500;
      color:var(--ink-mid); background:var(--off-white); cursor:pointer; outline:none;
      transition:border-color .2s;
    }
    .sort-select:focus { border-color:var(--accent); }

    .search-box {
      display:flex; align-items:center; gap:7px;
      background:var(--off-white); border:1px solid var(--border);
      border-radius:7px; padding:5px 11px; transition:all .2s;
    }
    .search-box:focus-within { border-color:var(--accent); background:white; }
    .search-box svg { width:13px; height:13px; color:var(--ink-soft); flex-shrink:0; }
    .search-box input {
      border:none; outline:none; background:transparent;
      font-family:'Plus Jakarta Sans',sans-serif; font-size:12px;
      color:var(--ink); width:160px;
    }
    .search-box input::placeholder { color:var(--ink-soft); }

    /* ── MAIN ────────────────────────────────────────────── */
    main { max-width:1320px; margin:0 auto; padding:34px 52px; }

    .section-header { display:flex; align-items:baseline; gap:10px; margin-bottom:20px; }
    .section-title  { font-size:19px; font-weight:700; color:var(--ink); letter-spacing:-.03em; }
    .section-count  { font-size:12px; color:var(--ink-soft); }

    /* ── GRID ────────────────────────────────────────────── */
    .books-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(215px, 1fr));
      gap:20px;
    }

    /* ── CARD ────────────────────────────────────────────── */
    .book-card {
      background:white; border-radius:var(--r); border:1px solid var(--border);
      overflow:hidden; box-shadow:var(--shadow-xs);
      transition:transform .25s cubic-bezier(.34,1.2,.64,1), box-shadow .25s, border-color .25s;
      cursor:pointer; position:relative; animation:rise .4s ease both;
    }
    .book-card:hover { transform:translateY(-5px); box-shadow:var(--shadow-md); border-color:var(--border-dark); }
    @keyframes rise { from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);} }

    .card-cover { width:100%; height:220px; background:var(--off-white-2); position:relative; overflow:hidden; }
    .card-cover img { width:100%; height:100%; object-fit:cover; display:block; }
    .cover-ph {
      width:100%; height:100%; display:flex; flex-direction:column;
      align-items:center; justify-content:center; padding:16px; text-align:center;
      background:var(--off-white-2);
    }
    .cover-ph svg       { width:34px; height:34px; opacity:.18; margin-bottom:9px; }
    .cover-ph-title     { font-size:13px; font-weight:600; color:var(--ink-soft); line-height:1.4; letter-spacing:-.01em; }

    .progress-line      { position:absolute; bottom:0; left:0; right:0; height:3px; background:rgba(0,0,0,.08); }
    .progress-line-fill { height:100%; background:var(--accent); transition:width .4s; }

    .status-pill {
      position:absolute; top:10px; right:10px; border-radius:5px; padding:3px 8px;
      font-size:9px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
      background:rgba(255,255,255,.9); backdrop-filter:blur(6px); color:var(--ink-mid);
    }
    .pill-done    { background:rgba(42,92,69,.9); color:white; }
    .pill-reading { background:rgba(30,60,110,.9); color:white; }

    .fav-btn {
      position:absolute; top:10px; left:10px;
      background:rgba(255,255,255,.85); backdrop-filter:blur(6px);
      border:none; border-radius:6px; width:28px; height:28px;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:transform .2s;
    }
    .fav-btn:hover { transform:scale(1.1); }
    .fav-btn svg { width:13px; height:13px; }
    .fav-btn.active svg { fill:#d03050; stroke:#d03050; }

    .card-body      { padding:13px 14px 14px; }
    .card-genre-row { margin-bottom:8px; }
    .card-title     { font-size:14px; font-weight:700; line-height:1.35; letter-spacing:-.02em; margin-bottom:3px; }
    .card-author    { font-size:11px; color:var(--ink-mid); font-weight:400; margin-bottom:10px; }
    .card-footer    { display:flex; align-items:center; justify-content:space-between; }
    .stars          { display:flex; gap:1px; }
    .star           { font-size:11px; color:#ddd; }
    .star.on        { color:#d4903a; }
    .card-pct       { font-size:11px; color:var(--ink-soft); font-weight:500; }
    .card-note      { font-size:11px; color:var(--ink-mid); margin-top:8px; line-height:1.5; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; opacity:.75; }
    .card-date      { font-size:10px; color:var(--ink-soft); margin-top:5px; }

    .del-btn {
      position:absolute; bottom:10px; right:10px;
      background:white; border:1px solid var(--border); border-radius:6px;
      padding:4px 8px; font-family:'Plus Jakarta Sans',sans-serif;
      font-size:10px; font-weight:600; color:#c03030; cursor:pointer;
      opacity:0; transition:opacity .2s, background .15s;
      display:flex; align-items:center; gap:4px;
    }
    .del-btn svg { width:11px; height:11px; }
    .book-card:hover .del-btn { opacity:1; }
    .del-btn:hover { background:#fee8e8; border-color:#f0b0b0; }

    /* ── EMPTY ───────────────────────────────────────────── */
    .empty-state { grid-column:1/-1; text-align:center; padding:80px 20px; color:var(--ink-soft); }
    .empty-state svg { width:44px; height:44px; opacity:.2; margin-bottom:14px; }
    .empty-state h3 { font-size:17px; font-weight:700; letter-spacing:-.02em; color:var(--ink-mid); margin-bottom:5px; }
    .empty-state p  { font-size:13px; }

    /* ── OVERLAY / MODAL ─────────────────────────────────── */
    .overlay {
      display:none; position:fixed; inset:0;
      background:rgba(26,24,22,.45); backdrop-filter:blur(6px);
      z-index:200; align-items:center; justify-content:center; padding:20px;
    }
    .overlay.open { display:flex; }
    .modal {
      background:white; border-radius:14px; padding:36px;
      width:100%; max-width:560px; max-height:92vh; overflow-y:auto;
      box-shadow:0 32px 96px rgba(26,24,22,.2);
      animation:pop .28s cubic-bezier(.34,1.2,.64,1);
    }
    @keyframes pop { from{opacity:0;transform:scale(.94);}to{opacity:1;transform:scale(1);} }

    .modal-header  { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
    .modal-title   { font-size:18px; font-weight:700; letter-spacing:-.03em; }
    .modal-close   { background:var(--off-white-2); border:1px solid var(--border); width:32px; height:32px; border-radius:7px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--ink-mid); font-size:16px; transition:background .2s; }
    .modal-close:hover { background:var(--border); }

    .modal-tabs    { display:flex; gap:2px; margin-bottom:24px; background:var(--off-white-2); border-radius:8px; padding:3px; border:1px solid var(--border); }
    .tab-btn       { flex:1; background:transparent; border:none; padding:7px 0; border-radius:6px; font-family:'Plus Jakarta Sans',sans-serif; font-size:11px; font-weight:700; color:var(--ink-soft); cursor:pointer; letter-spacing:.06em; text-transform:uppercase; transition:all .18s; }
    .tab-btn.active{ background:white; color:var(--ink); box-shadow:var(--shadow-xs); border:1px solid var(--border); }
    .tab-pane      { display:none; }
    .tab-pane.active{ display:block; }

    .form-group { margin-bottom:16px; }
    .form-row   { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    label { display:block; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-soft); margin-bottom:6px; }

    input[type="text"],input[type="url"],input[type="date"],input[type="number"],select,textarea {
      width:100%; border:1px solid var(--border); border-radius:7px;
      padding:9px 12px; font-family:'Plus Jakarta Sans',sans-serif;
      font-size:13px; color:var(--ink); background:var(--off-white); outline:none;
      transition:border-color .18s, background .18s;
    }
    input:focus,select:focus,textarea:focus { border-color:var(--accent); background:white; }
    textarea { resize:vertical; min-height:84px; line-height:1.6; }
    select   { cursor:pointer; }

    .star-row        { display:flex; gap:4px; }
    .star-row button { font-size:20px; background:none; border:none; cursor:pointer; transition:transform .15s; line-height:1; color:#ddd; }
    .star-row button:hover { transform:scale(1.18); }
    .star-row button.on    { color:#d4903a; }

    .range-wrap { display:flex; align-items:center; gap:10px; }
    .range-wrap input[type="range"] { flex:1; padding:0; border:none; accent-color:var(--accent); cursor:pointer; }
    .range-pct { min-width:36px; text-align:right; font-size:13px; font-weight:700; color:var(--accent); }

    .form-actions { display:flex; gap:8px; margin-top:22px; }
    .btn-save   { flex:1; background:var(--ink); color:white; border:none; padding:11px; border-radius:8px; font-family:'Plus Jakarta Sans',sans-serif; font-size:13px; font-weight:700; cursor:pointer; transition:background .2s; }
    .btn-save:hover { background:#333; }
    .btn-cancel { background:var(--off-white-2); color:var(--ink-mid); border:1px solid var(--border); padding:11px 16px; border-radius:8px; font-family:'Plus Jakarta Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:background .2s; }
    .btn-cancel:hover { background:var(--border); }
    .hint { font-size:11px; color:var(--ink-soft); margin-top:5px; }

    /* ── DETAIL ──────────────────────────────────────────── */
    .d-cover-row { display:flex; gap:18px; margin-bottom:20px; align-items:flex-start; }
    .d-cover     { width:90px; height:126px; border-radius:7px; object-fit:cover; box-shadow:var(--shadow-md); flex-shrink:0; }
    .d-cover-ph  { width:90px; height:126px; border-radius:7px; flex-shrink:0; background:var(--off-white-2); display:flex; align-items:center; justify-content:center; border:1px solid var(--border); }
    .d-cover-ph svg { width:28px; height:28px; opacity:.2; }
    .d-meta      { flex:1; }
    .d-author    { font-size:12px; color:var(--ink-mid); margin:6px 0 10px; }
    .d-stars     { display:flex; gap:2px; margin-bottom:10px; }
    .d-dates     { font-size:11px; color:var(--ink-soft); margin-bottom:10px; }
    .d-prog-label{ font-size:11px; color:var(--ink-mid); font-weight:600; margin-bottom:5px; }
    .d-prog-bg   { height:5px; background:var(--off-white-2); border-radius:10px; }
    .d-prog-fill { height:100%; background:var(--accent); border-radius:10px; }
    .d-quote     { border-left:2px solid var(--accent); padding:10px 14px; margin-bottom:16px; font-size:14px; color:var(--ink-mid); background:var(--accent-bg); border-radius:0 7px 7px 0; line-height:1.65; }
    .d-notes-lbl { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-soft); margin-bottom:7px; }
    .d-notes     { font-size:13px; color:var(--ink); line-height:1.7; }

    @media(max-width:768px){
      .nav-main, .filter-bar { padding:0 18px; }
      main { padding:24px 18px; }
      .hero-content { padding:20px 18px; }
      .nav-center { display:none; }
      .goal-chip  { display:none; }
      .hero-title { font-size:22px; }
      .form-row   { grid-template-columns:1fr; }
      .modal      { padding:24px 18px; }
    }
  </style>
</head>
<body>

<!-- TOP NAV -->
<div class="top-nav">
  <div class="nav-main">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 20 20" fill="none" stroke-width="1.6">
          <rect x="3" y="2" width="10" height="16" rx="1.5"/>
          <path d="M13 4h2a1.5 1.5 0 0 1 1.5 1.5v11A1.5 1.5 0 0 1 15 18h-2"/>
          <line x1="6" y1="7" x2="10" y2="7"/>
          <line x1="6" y1="10" x2="10" y2="10"/>
        </svg>
      </div>
      <span class="logo-name">Bookshelf<span class="logo-dot">.</span></span>
    </div>

    <div class="nav-center">
      <div class="stat-pill">
        <span class="stat-pill-num" id="stat-total">0</span>
        <span class="stat-pill-label">books</span>
        <div class="spd"></div>
        <span class="stat-pill-sub"><span id="stat-reading">0</span> reading</span>
        <div class="spd"></div>
        <span class="stat-pill-sub"><span id="stat-done">0</span> done</span>
        <div class="spd"></div>
        <span class="stat-pill-sub"><span id="stat-fav">0</span> fav</span>
      </div>
    </div>

    <div class="nav-right">
      <div class="goal-chip" onclick="openGoalModal()">
        <div class="goal-chip-bar"><div class="goal-chip-fill" id="goal-chip-fill" style="width:0%"></div></div>
        <span class="goal-chip-text" id="goal-chip-text">Set goal</span>
      </div>
      <button class="btn-add" onclick="openModal()">
        <svg viewBox="0 0 14 14" fill="none" stroke-width="2.2">
          <line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/>
        </svg>
        Add Book
      </button>
    </div>
  </div>
</div>

<!-- HERO BANNER -->
<div class="hero">
  <img class="hero-img"
    src="https://images.unsplash.com/photo-1495446815901-a7297e633e8d?w=1600&q=85&auto=format&fit=crop"
    alt="Library"
    onerror="this.src='https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?w=1600&q=80'"/>
  <div class="hero-content">
    <div class="hero-label">Esykha's personal library</div>
    <div class="hero-title">
      My <span>Bookshelf</span>
    </div>
    <div class="hero-meta">
      <div class="hero-badge">
        <div class="hero-badge-dot green"></div>
        <span id="hero-reading">0 reading</span>
      </div>
      <div class="hero-badge">
        <div class="hero-badge-dot blue"></div>
        <span id="hero-done">0 finished</span>
      </div>
      <div class="hero-goal-wrap" onclick="openGoalModal()">
        <div class="hero-goal-bar-bg">
          <div class="hero-goal-bar-fill" id="hero-goal-fill" style="width:0%"></div>
        </div>
        <span class="hero-goal-text" id="hero-goal-text">—</span>
        <button class="hero-goal-set" id="hero-goal-set">Set goal</button>
      </div>
    </div>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <button class="nav-tab active" onclick="setFilter(this,'all')">All</button>
  <button class="nav-tab" onclick="setFilter(this,'reading')">Reading</button>
  <button class="nav-tab" onclick="setFilter(this,'finished')">Finished</button>
  <button class="nav-tab" onclick="setFilter(this,'not started')">Not Started</button>
  <button class="nav-tab" onclick="setFilter(this,'fav')">Favorites</button>
  <div class="bar-right">
    <select class="sort-select" id="sort-select" onchange="renderBooks()">
      <option value="recent">Recently Added</option>
      <option value="title">Title A–Z</option>
      <option value="author">Author A–Z</option>
      <option value="rating">Highest Rated</option>
      <option value="progress">Most Progress</option>
    </select>
    <div class="search-box">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="7" cy="7" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search…" oninput="renderBooks()"/>
    </div>
  </div>
</div>

<!-- MAIN -->
<main>
  <div class="section-header">
    <h2 class="section-title" id="section-title">All Books</h2>
    <span class="section-count" id="visible-count"></span>
  </div>
  <div class="books-grid" id="books-grid"></div>
</main>

<!-- ADD / EDIT MODAL -->
<div class="overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-title-txt">Add New Book</h3>
      <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="modal-tabs">
      <button class="tab-btn active" onclick="switchTab(this,'t-info')">Info</button>
      <button class="tab-btn" onclick="switchTab(this,'t-progress')">Progress</button>
      <button class="tab-btn" onclick="switchTab(this,'t-notes')">Notes</button>
    </div>
    <div class="tab-pane active" id="t-info">
      <div class="form-row">
        <div class="form-group"><label>Title *</label><input type="text" id="f-title" placeholder="Book title"/></div>
        <div class="form-group"><label>Author *</label><input type="text" id="f-author" placeholder="Author name"/></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Genre</label>
          <select id="f-genre">
            <option value="">— select —</option>
            <option>Fiction</option><option>Non Fiction</option><option>Historical Fiction</option>
            <option>Mystery</option><option>Thriller</option><option>Science Fiction</option>
            <option>Fantasy</option><option>Romance</option><option>Biography</option>
            <option>Self-Help</option><option>Psychology</option><option>Philosophy</option>
            <option>Poetry</option><option>Other</option>
          </select>
        </div>
        <div class="form-group"><label>Cover Image URL</label><input type="url" id="f-cover" placeholder="https://…"/></div>
      </div>
      <div class="form-group">
        <label>Rating</label>
        <div class="star-row" id="star-row">
          <button onclick="setRating(1)">&#9733;</button><button onclick="setRating(2)">&#9733;</button>
          <button onclick="setRating(3)">&#9733;</button><button onclick="setRating(4)">&#9733;</button>
          <button onclick="setRating(5)">&#9733;</button>
        </div>
      </div>
    </div>
    <div class="tab-pane" id="t-progress">
      <div class="form-group">
        <label>Reading Status</label>
        <select id="f-status">
          <option value="not started">Not Started</option>
          <option value="reading">Reading</option>
          <option value="finished">Finished</option>
        </select>
      </div>
      <div class="form-group">
        <label>Progress</label>
        <div class="range-wrap">
          <input type="range" id="f-progress" min="0" max="100" value="0"
                 oninput="document.getElementById('pv').textContent=this.value+'%'"/>
          <span class="range-pct" id="pv">0%</span>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Date Started</label><input type="date" id="f-ds"/></div>
        <div class="form-group"><label>Date Finished</label><input type="date" id="f-de"/></div>
      </div>
    </div>
    <div class="tab-pane" id="t-notes">
      <div class="form-group">
        <label>Review / Notes</label>
        <textarea id="f-notes" placeholder="Your thoughts, reflections, takeaways…"></textarea>
      </div>
      <div class="form-group">
        <label>Favorite Quote</label>
        <textarea id="f-quote" placeholder="A line that stayed with you…" style="min-height:68px;"></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveBook()">Save Book</button>
    </div>
  </div>
</div>

<!-- GOAL MODAL -->
<div class="overlay" id="goal-overlay">
  <div class="modal" style="max-width:340px;padding:32px;">
    <div class="modal-header">
      <h3 class="modal-title">Reading Goal</h3>
      <button class="modal-close" onclick="closeGoalModal()">&#x2715;</button>
    </div>
    <div class="form-group">
      <label>Books to finish this year</label>
      <input type="number" id="goal-input" placeholder="e.g. 24" min="1"/>
      <p class="hint">Set a number to track your yearly reading progress.</p>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeGoalModal()">Cancel</button>
      <button class="btn-save" onclick="saveGoal()">Save</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="overlay" id="detail-overlay">
  <div class="modal" style="max-width:500px;">
    <div class="modal-header">
      <h3 class="modal-title" id="d-title"></h3>
      <button class="modal-close" onclick="closeDetail()">&#x2715;</button>
    </div>
    <div id="d-body"></div>
    <div class="form-actions" style="margin-top:20px;">
      <button class="btn-cancel" onclick="closeDetail()">Close</button>
      <button class="btn-save" id="d-edit-btn">Edit Book</button>
    </div>
  </div>
</div>

<script>
let books = JSON.parse(localStorage.getItem('bs_v5') || 'null');
let goal  = parseInt(localStorage.getItem('bs_goal_v5') || '0');
let editId = null, curRating = 0, curFilter = 'all';

const GC = g => 'gc-' + (g||'Other').replace(/\s+/g,'-');

if (!books) {
  books = [
    {id:1,title:'Why We Sleep',author:'Matthew Walker',genre:'Non Fiction',status:'finished',cover:'https://covers.openlibrary.org/b/id/8739161-M.jpg',rating:5,progress:100,ds:'2025-01-05',de:'2025-01-20',notes:'Completely changed how I think about sleep. Every habit I had was wrong.',quote:'Sleep is the single most effective thing we can do to reset our brain and body.',fav:true},
    {id:2,title:'Grit',author:'Angela Duckworth',genre:'Psychology',status:'reading',cover:'https://covers.openlibrary.org/b/id/8231856-M.jpg',rating:4,progress:62,ds:'2025-02-01',de:'',notes:'Passion and perseverance over raw talent — very motivating.',quote:'',fav:false},
    {id:3,title:'The Name of the Rose',author:'Umberto Eco',genre:'Historical Fiction',status:'reading',cover:'',rating:5,progress:38,ds:'2025-03-10',de:'',notes:'Dense but atmospheric. A medieval mystery that rewards patience.',quote:'',fav:true},
    {id:4,title:'Sapiens',author:'Yuval Noah Harari',genre:'Non Fiction',status:'not started',cover:'https://covers.openlibrary.org/b/id/8406786-M.jpg',rating:0,progress:0,ds:'',de:'',notes:'',quote:'',fav:false},
  ];
  save();
}

function save() { localStorage.setItem('bs_v5', JSON.stringify(books)); }

function renderBooks() {
  const grid = document.getElementById('books-grid');
  const q    = document.getElementById('search-input').value.toLowerCase();
  const sort = document.getElementById('sort-select').value;

  let list = books.filter(b => {
    if (curFilter==='fav')  return b.fav;
    if (curFilter!=='all')  return b.status===curFilter;
    return true;
  }).filter(b => !q || b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q));

  list.sort((a,b)=>{
    if(sort==='title')    return a.title.localeCompare(b.title);
    if(sort==='author')   return a.author.localeCompare(b.author);
    if(sort==='rating')   return b.rating-a.rating;
    if(sort==='progress') return b.progress-a.progress;
    return b.id-a.id;
  });

  // Stats
  const nTotal   = books.length;
  const nReading = books.filter(b=>b.status==='reading').length;
  const nDone    = books.filter(b=>b.status==='finished').length;
  const nFav     = books.filter(b=>b.fav).length;
  document.getElementById('stat-total').textContent   = nTotal;
  document.getElementById('stat-reading').textContent = nReading;
  document.getElementById('stat-done').textContent    = nDone;
  document.getElementById('stat-fav').textContent     = nFav;
  document.getElementById('visible-count').textContent = list.length+(list.length===1?' book':' books');
  document.getElementById('hero-reading').textContent = nReading+' reading';
  document.getElementById('hero-done').textContent    = nDone+' finished';

  // Goal
  if (goal > 0) {
    const pct = Math.min(100, Math.round(nDone/goal*100));
    document.getElementById('goal-chip-fill').style.width = pct+'%';
    document.getElementById('goal-chip-text').textContent = nDone+'/'+goal;
    document.getElementById('hero-goal-fill').style.width = pct+'%';
    document.getElementById('hero-goal-text').textContent = nDone+' of '+goal+' books';
    document.getElementById('hero-goal-set').textContent  = 'Change goal';
  } else {
    document.getElementById('goal-chip-fill').style.width = '0%';
    document.getElementById('goal-chip-text').textContent = 'Set goal';
    document.getElementById('hero-goal-fill').style.width = '0%';
    document.getElementById('hero-goal-text').textContent = '';
    document.getElementById('hero-goal-set').textContent  = 'Set reading goal';
  }

  if (!list.length) {
    grid.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      <h3>No books here</h3><p>Add your first book to get started.</p>
    </div>`;
    return;
  }

  grid.innerHTML = list.map((b,i)=>{
    const gc    = GC(b.genre);
    const stars = [1,2,3,4,5].map(n=>`<span class="star ${n<=b.rating?'on':''}">&#9733;</span>`).join('');
    const sLabel= {reading:'Reading',finished:'Finished','not started':'Not Started'}[b.status];
    const sCls  = b.status==='finished'?'pill-done':b.status==='reading'?'pill-reading':'';
    const covHtml = b.cover
      ?`<img src="${b.cover}" onerror="this.style.display='none';this.nextSibling.style.display='flex'"><div class="cover-ph" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><div class="cover-ph-title">${esc(b.title)}</div></div>`
      :`<div class="cover-ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><div class="cover-ph-title">${esc(b.title)}</div></div>`;
    const dateStr = b.ds?`Started ${fmt(b.ds)}${b.de?' · Finished '+fmt(b.de):''}` :'';
    return `
    <div class="book-card" style="animation-delay:${i*.055}s" onclick="openDetail(${b.id})">
      <button class="fav-btn ${b.fav?'active':''}" onclick="event.stopPropagation();toggleFav(${b.id})">
        <svg viewBox="0 0 14 14" fill="${b.fav?'currentColor':'none'}" stroke="currentColor" stroke-width="1.6">
          <path d="M7 12.5S1 8.5 1 5a3 3 0 0 1 6-1.1A3 3 0 0 1 13 5c0 3.5-6 7.5-6 7.5z"/>
        </svg>
      </button>
      <div class="card-cover">
        ${covHtml}
        <div class="progress-line"><div class="progress-line-fill" style="width:${b.progress}%"></div></div>
        <span class="status-pill ${sCls}">${sLabel}</span>
      </div>
      <div class="card-body">
        <div class="card-genre-row"><span class="genre-tag ${gc}">${b.genre||'—'}</span></div>
        <div class="card-title">${esc(b.title)}</div>
        <div class="card-author">${esc(b.author)}</div>
        <div class="card-footer"><div class="stars">${stars}</div><span class="card-pct">${b.progress}%</span></div>
        ${b.notes?`<div class="card-note">${esc(b.notes)}</div>`:''}
        ${dateStr?`<div class="card-date">${dateStr}</div>`:''}
      </div>
      <button class="del-btn" onclick="event.stopPropagation();delBook(${b.id})">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6">
          <polyline points="1,2.5 11,2.5"/><path d="M9.5 2.5v7.5a1 1 0 0 1-1 1h-5a1 1 0 0 1-1-1V2.5"/>
          <path d="M4.5 2.5V1.5h3v1"/><line x1="4.5" y1="5" x2="4.5" y2="8"/><line x1="7.5" y1="5" x2="7.5" y2="8"/>
        </svg>
        Remove
      </button>
    </div>`;
  }).join('');
}

function setFilter(btn,f){
  curFilter=f;
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const lbl={all:'All Books',reading:'Reading',finished:'Finished','not started':'Not Started',fav:'Favorites'};
  document.getElementById('section-title').textContent=lbl[f];
  renderBooks();
}

function openModal(id=null){
  editId=id; const b=id?books.find(x=>x.id===id):null;
  document.getElementById('modal-title-txt').textContent=id?'Edit Book':'Add New Book';
  document.getElementById('f-title').value   =b?.title   ||'';
  document.getElementById('f-author').value  =b?.author  ||'';
  document.getElementById('f-genre').value   =b?.genre   ||'';
  document.getElementById('f-cover').value   =b?.cover   ||'';
  document.getElementById('f-status').value  =b?.status  ||'not started';
  document.getElementById('f-progress').value=b?.progress||0;
  document.getElementById('pv').textContent  =(b?.progress||0)+'%';
  document.getElementById('f-ds').value      =b?.ds||'';
  document.getElementById('f-de').value      =b?.de||'';
  document.getElementById('f-notes').value   =b?.notes||'';
  document.getElementById('f-quote').value   =b?.quote||'';
  setRating(b?.rating||0);
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelector('.tab-btn').classList.add('active');
  document.getElementById('t-info').classList.add('active');
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); editId=null; }
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

function switchTab(btn,pane){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active'); document.getElementById(pane).classList.add('active');
}
function setRating(n){
  curRating=n;
  document.querySelectorAll('#star-row button').forEach((b,i)=>b.classList.toggle('on',i<n));
}
function saveBook(){
  const title=document.getElementById('f-title').value.trim();
  const author=document.getElementById('f-author').value.trim();
  if(!title||!author){alert('Please fill in title and author.');return;}
  const d={title,author,genre:document.getElementById('f-genre').value,cover:document.getElementById('f-cover').value.trim(),status:document.getElementById('f-status').value,progress:parseInt(document.getElementById('f-progress').value),ds:document.getElementById('f-ds').value,de:document.getElementById('f-de').value,notes:document.getElementById('f-notes').value.trim(),quote:document.getElementById('f-quote').value.trim(),rating:curRating};
  if(editId){const i=books.findIndex(b=>b.id===editId);books[i]={...books[i],...d};}
  else{books.unshift({id:Date.now(),fav:false,...d});}
  save();closeModal();renderBooks();
}
function delBook(id){if(!confirm('Remove this book?'))return;books=books.filter(b=>b.id!==id);save();renderBooks();}
function toggleFav(id){const b=books.find(x=>x.id===id);if(b){b.fav=!b.fav;save();renderBooks();}}

function openDetail(id){
  const b=books.find(x=>x.id===id);if(!b)return;
  const gc=GC(b.genre);
  const stars=[1,2,3,4,5].map(n=>`<span class="star ${n<=b.rating?'on':''}">&#9733;</span>`).join('');
  const dates=[b.ds&&'Started: '+fmt(b.ds),b.de&&'Finished: '+fmt(b.de)].filter(Boolean).join(' &middot; ');
  const covEl=b.cover?`<img class="d-cover" src="${b.cover}" onerror="this.outerHTML='<div class=d-cover-ph><svg viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'1.3\\'><path d=\\'M4 19.5A2.5 2.5 0 0 1 6.5 17H20\\'/><path d=\\'M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z\\'/></svg></div>'">`:`<div class="d-cover-ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div>`;
  document.getElementById('d-title').textContent=b.title;
  document.getElementById('d-body').innerHTML=`
    <div class="d-cover-row">${covEl}<div class="d-meta">
      <span class="genre-tag ${gc}">${b.genre||'—'}</span>
      <div class="d-author">${esc(b.author)}</div>
      <div class="d-stars">${stars}</div>
      ${dates?`<div class="d-dates">${dates}</div>`:''}
      <div class="d-prog-label">Progress: <strong style="color:var(--accent)">${b.progress}%</strong></div>
      <div class="d-prog-bg"><div class="d-prog-fill" style="width:${b.progress}%"></div></div>
    </div></div>
    ${b.quote?`<div class="d-quote">"${esc(b.quote)}"</div>`:''}
    ${b.notes?`<div class="d-notes-lbl">Notes</div><div class="d-notes">${esc(b.notes).replace(/\n/g,'<br>')}</div>`:''}
  `;
  document.getElementById('d-edit-btn').onclick=()=>{closeDetail();openModal(id);};
  document.getElementById('detail-overlay').classList.add('open');
}
function closeDetail(){document.getElementById('detail-overlay').classList.remove('open');}
document.getElementById('detail-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeDetail();});

function openGoalModal(){document.getElementById('goal-input').value=goal||'';document.getElementById('goal-overlay').classList.add('open');}
function closeGoalModal(){document.getElementById('goal-overlay').classList.remove('open');}
document.getElementById('goal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeGoalModal();});
function saveGoal(){goal=parseInt(document.getElementById('goal-input').value)||0;localStorage.setItem('bs_goal_v5',goal);closeGoalModal();renderBooks();}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmt(d){if(!d)return'';const[y,m,day]=d.split('-');return['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]+' '+parseInt(day)+', '+y;}

renderBooks();
</script>
</body>
</html>
